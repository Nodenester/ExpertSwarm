services:
  trainer:
    build: .
    container_name: swarm-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./datasets:/datasets
      - ./checkpoints:/checkpoints
      - ./configs:/app/configs
      - ./src:/app/src
      - model-cache:/root/.cache/huggingface
    environment:
      - CODEGATE_URL=http://host.docker.internal:9212
      - CODEGATE_API_KEY=proxy-local-key
      - TEACHER_MODEL=claude-sonnet-4-20250514
      - SWARM_RUNNER_URL=http://host.docker.internal:8100
      - BASE_MODEL=Qwen/Qwen3.5-0.8B
      - LORA_OUTPUT_DIR=/checkpoints
      - DATASET_DIR=/datasets
      - CUDA_VISIBLE_DEVICES=GPU-3ad3e2fe-e918-79b5-8ee7-ff1a185b8c2e
      - TORCH_COMPILE_DISABLE=1
      - WANDB_MODE=disabled
      - HF_TOKEN=${HF_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "4g"
    stdin_open: true
    tty: true

volumes:
  model-cache:
